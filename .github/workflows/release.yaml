name: Release

on:
  push:
    branches:
      - dev
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build all platforms
        run: |
          for combo in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            os="${combo%-*}"
            arch="${combo#*-}"
            output="o2x-$os-$arch"
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -ldflags="-s -w" -o "$output" ./main.go
            tar -czvf "$output.tar.gz" "$output"
            rm -f "$output"
          done
          ls -la o2x-*

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            o2x-linux-amd64.tar.gz
            o2x-linux-arm64.tar.gz
            o2x-darwin-amd64.tar.gz
            o2x-darwin-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}