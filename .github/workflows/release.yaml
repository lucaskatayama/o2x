name: Release

on:
  push:
    branches:
      - dev
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: .tar.gz
          - goos: linux
            goarch: arm64
            ext: .tar.gz
          - goos: darwin
            goarch: amd64
            ext: .tar.gz
          - goos: darwin
            goarch: arm64
            ext: .tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
        id: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          output_name="o2x-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            output_name="o2x-${{ matrix.goos }}-${{ matrix.goarch }}.exe"
          fi
          go build -ldflags="-s -w" -o "$output_name" ./main.go
          
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a -tzip "o2x-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "$output_name"
          else
            tar -czvf "o2x-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "$output_name"
          fi
          ls -la o2x-*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: o2x-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            o2x-${{ matrix.goos }}-${{ matrix.goarch }}
            o2x-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            o2x-${{ matrix.goos }}-${{ matrix.goarch }}.zip
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ./artifacts/o2x-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}